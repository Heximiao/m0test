slam_toolbox:
  ros__parameters:
    use_sim_time: false
    mode: mapping

    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan

    transform_publish_period: 0.05
    map_update_interval: 3.0
    resolution: 0.05
    max_laser_range: 8.0
    throttle_scans: 2
    minimum_time_interval: 0.2
    transform_timeout: 0.2
    tf_buffer_duration: 10.0
    stack_size_to_use: 20000000
    enable_interactive_mode: false
